<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIN's Blog</title>
    <link rel="stylesheet" href="/Blog/style.css">
    <link rel="stylesheet" href="register_visualizer.css">
    <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
        
        const navbar = document.getElementById('navbar');
        const hero = document.querySelector('.hero');
        const heroHeight = hero ? hero.offsetHeight : 0;

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            if (scrollY > heroHeight) {
            navbar.classList.add('scrolled');
            } else {
            navbar.classList.remove('scrolled');
            }
        });
       
    </script>

        <!-- Odometer 数字滚动插件 -->
    <link rel="stylesheet" href="/Blog/odometr.css">
    <script src="/Blog/odometr.js"></script>
    <!-- 博客运行计时核心脚本 -->
    <script>
    window.pjaxLoaded = function(){
        var blog_running_days=document.getElementById("blog_running_days");
        var blog_running_hours=document.getElementById("blog_running_hours");
        var blog_running_mins=document.getElementById("blog_running_mins");
        var blog_running_secs=document.getElementById("blog_running_secs");
        
        function refresh_blog_running_time(){
            // 博客起始时间：2024年10月7日（月份0-11，所以9代表10月）
            var time = new Date() - new Date(2024, 9, 7, 0, 0, 0);
            var d=parseInt(time/24/60/60/1000);
            var h=parseInt(time%(24*60*60*1000)/60/60/1000);
            var m=parseInt(time%(60*60*1000)/60/1000);
            var s=parseInt(time%(60*1000)/1000);
            
            blog_running_days.innerHTML=d;
            blog_running_hours.innerHTML=h;
            blog_running_mins.innerHTML=m;
            blog_running_secs.innerHTML=s;
        };
        
        refresh_blog_running_time();
        if (typeof(bottomTimeIntervalHasSet) == "undefined"){
            var bottomTimeIntervalHasSet = true;
            setInterval(refresh_blog_running_time,500);
        }
    };
    // 初始化数字滚动
    window.onload = function(){
        odometer_init();
        window.pjaxLoaded();
        initRegisterVisualizer();
    };

    function odometer_init(){
        let el = document.getElementsByClassName('odometer');
        for (let i = 0; i < el.length; i++) {
            od = new Odometer({
                el: el[i],
                format: 'ddd',
                duration: 200
            });
        }
    }
    </script>

</head>
<body>
    <!-- 导航 -->
    <nav class="nav" id="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="/Blog/index.html">首页</a></li>
                <li><a href="/Blog/sort.html">分类</a></li>
                <li><a href="/Blog/history.html">归档</a></li>
                <li><a href="/Blog/tool.html">工具</a></li>
                <li><a href="/Blog/aboutme.html">关于我</a></li>
            </ul>
        </div>
    </nav>


    <!-- 主体内容 -->
    <main class="main">
        <h1 style="text-align: center;color:rgb(255, 255, 255);user-select: none;">寄存器文档可视化</h1>

        <!-- 设备信息 -->
        <div class="device-info">
            <h2 id="device-name">选择SVD文件</h2>
            <div class="file-upload-section">
                <div class="file-upload-row">
                    <input type="file" id="svd-file-input" accept=".svd" style="display: none;">
                    <button id="select-file-btn" class="btn-primary">选择本地SVD文件</button>
                    <div class="default-files-section">
                        <label for="default-svd-select">选择网站SVD文件:</label>
                        <select id="default-svd-select" class="svd-select">
                            <option value="">-- 选择文件 --</option>
                            <!-- 动态添加选项 -->
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主要布局 -->
        <div class="visualizer-container">
            <!-- 左侧外设列表 -->
            <div class="peripherals-panel">
                <h3>外设列表</h3>
                <div class="peripherals-list" id="peripherals-list">
                    <!-- 外设列表将通过JavaScript动态生成 -->
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <!-- 右侧内容 -->
            <div class="content-panel">
                <!-- 寄存器列表 -->
                <div class="registers-section" id="registers-section">
                    <h3 id="peripheral-title">选择外设</h3>
                    <div class="registers-list" id="registers-list">
                        <!-- 寄存器列表将通过JavaScript动态生成 -->
                    </div>
                </div>

                <!-- 寄存器详情 -->
                <div class="register-detail" id="register-detail">
                    <h3 id="register-title">选择寄存器</h3>
                    <div class="register-info" id="register-info">
                        <!-- 寄存器详情将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container ">
            <!-- 版权信息 -->
            <div>Copyright © 2024 - 版权归属 LIN</div>
            <!-- 博客运行计时 -->
            <div class="running-time">
                本博客已运行 
                <span id="blog_running_days" class="odometer"></span> days , 
                <span id="blog_running_hours" class="odometer"></span> h , 
                <span id="blog_running_mins" class="odometer"></span> m , 
                <span id="blog_running_secs" class="odometer"></span> s
            </div>
        </div>
    </footer>

    <script>
        // 全局变量
        let svdData = null;
        let currentPeripheral = null;
        let currentRegister = null;

        // 初始化寄存器可视化工具
        function initRegisterVisualizer() {
            document.getElementById('select-file-btn').addEventListener('click', function() {
                document.getElementById('svd-file-input').click();
            });
            document.getElementById('default-svd-select').addEventListener('change', function(e) {
                const selectedFile = e.target.value;
                if (selectedFile) {
                    loadSvdFile(selectedFile);
                }
            });
            document.getElementById('svd-file-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    document.getElementById('default-svd-select').value = '';
                    loadSvdFileFromInput(file);
                }
            });
            
            loadDefaultSvdFiles();
        }

        // 加载默认SVD文件列表
        function loadDefaultSvdFiles() {
            fetch('/Blog/tools/register_visualizer/svds/svd_list.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('无法访问svds文件夹');
                    }
                    return response.json();
                })
                .then(files => {
                    const select = document.getElementById('default-svd-select');
                    if (!select){
                        return;
                    }
                    files.forEach(file => {
                        const option = document.createElement('option');
                        option.value = file;
                        option.textContent = file;
                        select.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('加载默认SVD文件列表失败:', error);
                });
        }

        // 从文件输入加载SVD文件
        function loadSvdFileFromInput(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const xmlText = e.target.result;
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
                    
                    const parserError = xmlDoc.querySelector('parsererror');
                    if (parserError) {
                        throw new Error('XML解析失败: ' + parserError.textContent);
                    }

                    const deviceNameElement = xmlDoc.querySelector('device name');
                    
                    if (deviceNameElement) {
                        const deviceName = deviceNameElement.textContent;
                        document.getElementById('device-name').textContent = deviceName;
                    } else {
                        document.getElementById('device-name').textContent = '设备信息';
                    }
                    
                    resetRegisterViews();
                    
                    const peripherals = xmlDoc.querySelectorAll('peripheral');
                    displayPeripherals(peripherals);
                    
                    svdData = xmlDoc;
                } catch (error) {
                    console.error('解析SVD文件失败:', error);
                    document.getElementById('peripherals-list').innerHTML = '<div class="error">解析SVD文件失败: ' + error.message + '</div>';
                }
            };
            reader.onerror = function() {
                console.error('读取文件失败');
                document.getElementById('peripherals-list').innerHTML = '<div class="error">读取文件失败</div>';
            };
            reader.readAsText(file);
        }

        // 重置寄存器视图
        function resetRegisterViews() {
            document.getElementById('registers-list').innerHTML = '';
            document.getElementById('peripheral-title').textContent = '选择外设';
            
            document.getElementById('register-info').innerHTML = '';
            document.getElementById('register-title').textContent = '选择寄存器';
            
            currentPeripheral = null;
            currentRegister = null;
        }

        // 加载SVD文件
        function loadSvdFile(fileName) {
            const file = fileName || 'STM32G471xx.svd';
            
            fetch('/Blog/tools/register_visualizer/svds/' + file)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('文件加载失败: ' + response.status);
                    }
                    return response.text();
                })
                .then(xmlText => {
                    try {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
                        
                        const parserError = xmlDoc.querySelector('parsererror');
                        if (parserError) {
                            throw new Error('XML解析失败: ' + parserError.textContent);
                        }
                        
                        const deviceNameElement = xmlDoc.querySelector('device name');
                        
                        if (deviceNameElement) {
                            const deviceName = deviceNameElement.textContent;
                            document.getElementById('device-name').textContent = deviceName;
                        }
                        
                        resetRegisterViews();
                        
                        const peripherals = xmlDoc.querySelectorAll('peripheral');
                        displayPeripherals(peripherals);
                        
                        svdData = xmlDoc;
                    } catch (error) {
                        console.error('解析SVD文件失败:', error);
                        document.getElementById('peripherals-list').innerHTML = '<div class="error">解析SVD文件失败: ' + error.message + '</div>';
                    }
                })
                .catch(error => {
                    console.error('加载SVD文件失败:', error);
                    document.getElementById('peripherals-list').innerHTML = '<div class="error">加载SVD文件失败: ' + error.message + '</div>';
                });
        }

        // 显示外设列表
        function displayPeripherals(peripherals) {
            const peripheralsList = document.getElementById('peripherals-list');
            peripheralsList.innerHTML = '';
            
            peripherals.forEach(peripheral => {
                const nameElement = peripheral.querySelector('name');
                const descriptionElement = peripheral.querySelector('description');
                const baseAddressElement = peripheral.querySelector('baseAddress');
                
                if (nameElement && descriptionElement && baseAddressElement) {
                    const name = nameElement.textContent;
                    const description = descriptionElement.textContent;
                    const baseAddress = baseAddressElement.textContent;
                    
                    const peripheralItem = document.createElement('div');
                    peripheralItem.className = 'peripheral-item';
                    peripheralItem.innerHTML = `
                        <h4>${name}</h4>
                        <p>${description}</p>
                        <small>基地址: ${baseAddress}</small>
                    `;
                    
                    peripheralItem.addEventListener('click', () => {
                        selectPeripheral(peripheral);
                        document.querySelectorAll('.peripheral-item').forEach(item => {
                            item.classList.remove('selected');
                        });
                        peripheralItem.classList.add('selected');
                    });
                    
                    peripheralsList.appendChild(peripheralItem);
                }
            });
        }

        // 选择外设
        function selectPeripheral(peripheral) {
            currentPeripheral = peripheral;
            
            const nameElement = peripheral.querySelector('name');
            if (nameElement) {
                const name = nameElement.textContent;
                document.getElementById('peripheral-title').textContent = name;
            }
            
            const registers = peripheral.querySelectorAll('register');
            displayRegisters(registers);
            
            document.getElementById('register-title').textContent = '选择寄存器';
            document.getElementById('register-info').innerHTML = '';
        }

        function displayRegisters(registers) {
            const registersList = document.getElementById('registers-list');
            registersList.innerHTML = '';
            
            if (registers.length === 0) {
                registersList.innerHTML = '<div class="empty">该外设没有寄存器</div>';
                return;
            }
            
            registers.forEach(register => {
                const nameElement = register.querySelector('name');
                const descriptionElement = register.querySelector('description');
                const addressOffsetElement = register.querySelector('addressOffset');
                
                if (nameElement && descriptionElement && addressOffsetElement) {
                    const name = nameElement.textContent;
                    const description = descriptionElement.textContent;
                    const addressOffset = addressOffsetElement.textContent;
                    
                    const registerItem = document.createElement('div');
                    registerItem.className = 'register-item';
                    registerItem.innerHTML = `
                        <h4>${name}</h4>
                        <p>${description}</p>
                        <small>地址偏移: ${addressOffset}</small>
                    `;
                    
                    registerItem.addEventListener('click', () => {
                        selectRegister(register);
                        document.querySelectorAll('.register-item').forEach(item => {
                            item.classList.remove('selected');
                        });
                        registerItem.classList.add('selected');
                    });
                    
                    registersList.appendChild(registerItem);
                }
            });
        }

        // 选择寄存器
        function selectRegister(register) {
            currentRegister = register;
            
            const nameElement = register.querySelector('name');
            if (nameElement) {
                const name = nameElement.textContent;
                document.getElementById('register-title').textContent = name;
            }
            
            displayRegisterDetail(register);
        }

        function displayRegisterDetail(register) {
            const registerInfo = document.getElementById('register-info');
            
            const descriptionElement = register.querySelector('description');
            const addressOffsetElement = register.querySelector('addressOffset');
            const sizeElement = register.querySelector('size');
            const accessElement = register.querySelector('access');
            const resetValueElement = register.querySelector('resetValue');
            
            const description = descriptionElement ? descriptionElement.textContent : '未知';
            const addressOffset = addressOffsetElement ? addressOffsetElement.textContent : '未知';
            const size = sizeElement ? sizeElement.textContent : '32';
            const access = accessElement ? accessElement.textContent : 'unknown';
            const resetValue = resetValueElement ? resetValueElement.textContent : '0x0';
            
            const fields = register.querySelectorAll('field');
            
            registerInfo.innerHTML = `
                <div class="register-basic-info">
                    <p><strong>描述:</strong> ${description}</p>
                    <p><strong>地址偏移:</strong> ${addressOffset}</p>
                    <p><strong>大小:</strong> ${size} bits</p>
                    <p><strong>访问方式:</strong> ${access}</p>
                    <p><strong>复位值:</strong> ${resetValue}</p>
                </div>
                
                <div class="register-fields">
                    <h4>位域</h4>
                    ${fields.length > 0 ? displayFields(fields) : '<p class="empty">该寄存器没有位域</p>'}
                </div>
                
                <div class="register-visualization">
                    <h4>可视化</h4>
                    ${displayRegisterVisualization(register, fields)}
                </div>
            `;
        }

        // 显示位域
        function displayFields(fields) {
            let html = '<div class="fields-list">';
            
            fields.forEach(field => {
                const nameElement = field.querySelector('name');
                const descriptionElement = field.querySelector('description');
                const bitOffsetElement = field.querySelector('bitOffset');
                const bitWidthElement = field.querySelector('bitWidth');
                const accessElement = field.querySelector('access');
                
                if (nameElement && descriptionElement && bitOffsetElement && bitWidthElement) {
                    const name = nameElement.textContent;
                    const description = descriptionElement.textContent;
                    const bitOffset = bitOffsetElement.textContent;
                    const bitWidth = bitWidthElement.textContent;
                    const access = accessElement ? accessElement.textContent : 'unknown';
                    
                    html += `
                        <div class="field-item">
                            <h5>${name}</h5>
                            <p>${description}</p>
                            <small>位偏移: ${bitOffset}, 位宽: ${bitWidth}, 访问: ${access}</small>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            return html;
        }

        // 显示寄存器可视化
        function displayRegisterVisualization(register, fields) {
            const sizeElement = register.querySelector('size');
            const size = sizeElement ? parseInt(sizeElement.textContent) : 32;
            
            let html = `<div class="register-bits">`;
            
            for (let i = size - 1; i >= 0; i--) {
                let bitClass = 'bit';
                let bitLabel = i;
                
                let fieldName = '';
                fields.forEach(field => {
                    const bitOffsetElement = field.querySelector('bitOffset');
                    const bitWidthElement = field.querySelector('bitWidth');
                    const nameElement = field.querySelector('name');
                    
                    if (bitOffsetElement && bitWidthElement && nameElement) {
                        const bitOffset = parseInt(bitOffsetElement.textContent);
                        const bitWidth = parseInt(bitWidthElement.textContent);
                        
                        if (i >= bitOffset && i < bitOffset + bitWidth) {
                            fieldName = nameElement.textContent;
                            bitClass += ' field-bit';
                        }
                    }
                });
                
                html += `
                    <div class="${bitClass}">
                        <div class="bit-number">${bitLabel}</div>
                        <div class="bit-value">0</div>
                        ${fieldName ? `<div class="bit-field">${fieldName}</div>` : ''}
                    </div>
                `;
            }
            
            html += '</div>';
            return html;
        }
    </script>
</body>
