    <script>
        // const navbar = document.getElementById('navbar');
        // const hero = document.querySelector('.hero');
        // const heroHeight = hero.offsetHeight;
        const threshold = 200;

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            if (scrollY > threshold) {
            navbar.classList.add('scrolled');
            } else {

        <!-- Odometer 数字滚动插件 -->
    <link rel="stylesheet" href="/Blog/odometr.css">
    <script src="/Blog/odometr.js"></script>
    <!-- 博客运行计时核心脚本 -->
    <script>
    window.pjaxLoaded = function(){
        var blog_running_days=document.getElementById("blog_running_days");
        var blog_running_hours=document.getElementById("blog_running_hours");
        var blog_running_mins=document.getElementById("blog_running_mins");
        var blog_running_secs=document.getElementById("blog_running_secs");
        
        function refresh_blog_running_time(){
            // 博客起始时间：2024年10月7日（月份0-11，所以9代表10月）
            var time = new Date() - new Date(2024, 9, 7, 0, 0, 0);
            var d=parseInt(time/24/60/60/1000);
            var h=parseInt(time%(24*60*60*1000)/60/60/1000);
            var m=parseInt(time%(60*60*1000)/60/1000);
            var s=parseInt(time%(60*1000)/1000);
            
            blog_running_days.innerHTML=d;
            blog_running_hours.innerHTML=h;
            blog_running_mins.innerHTML=m;
            blog_running_secs.innerHTML=s;
        };
        
        refresh_blog_running_time();
        if (typeof(bottomTimeIntervalHasSet) == "undefined"){
            var bottomTimeIntervalHasSet = true;
            setInterval(refresh_blog_running_time,500);
        }
    };
    // 初始化数字滚动
    window.onload = function(){
        odometer_init();
        window.pjaxLoaded();
        hljs.highlightAll();
    };

    function odometer_init(){
        let el = document.getElementsByClassName('odometer');
        for (let i = 0; i < el.length; i++) {
            od = new Odometer({
                el: el[i],
                format: 'ddd',
                duration: 200
            });
        }
    }
    </script>

</head>

    <!-- 支持 Mermaid 流程图 -->
    {% if page.mermaid %}
        <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
        <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. 找到所有被 kramdown 标记为 mermaid 的代码块
            const mermaidBlocks = document.querySelectorAll('pre > code.language-mermaid');
            
            mermaidBlocks.forEach((codeBlock) => {
            // 2. 创建一个新的 div，类名为 mermaid
            const container = document.createElement('div');
            container.className = 'mermaid';
            // 3. 将原始内容（代码）放入 div
            container.textContent = codeBlock.textContent;
            
            // 4. 替换掉原本的 pre 标签
            const pre = codeBlock.parentElement;
            pre.parentNode.replaceChild(container, pre);
            });

            // 5. 手动启动渲染
            mermaid.initialize({ startOnLoad: true });
        });
        </script>
    {% endif %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toc = document.getElementById('markdown-toc');
            if (!toc) return;

            const headingIds = [];
            const tocLinks = toc.querySelectorAll('a');

            tocLinks.forEach(function(link) {
                const href = link.getAttribute('href');
                if (href && href.startsWith('#')) {
                    headingIds.push(href.substring(1));
                }
            });

            const headings = [];
            headingIds.forEach(function(id) {
                const heading = document.getElementById(id);
                if (heading) {
                    headings.push(heading);
                }
            });

            if (headings.length === 0) return;

            let currentActive = null;

            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('id');
                        const link = toc.querySelector('a[href="#' + id + '"]');
                        if (link && link !== currentActive) {
                            currentActive = link;

                            toc.querySelectorAll('a').forEach(function(a) {
                                a.classList.remove('active');
                            });
                            link.classList.add('active');

                            const linkTop = link.offsetTop;
                            const linkHeight = link.offsetHeight;
                            const tocHeight = toc.offsetHeight;
                            const scrollTop = toc.scrollTop;

                            function smoothScrollTo(element, targetTop, duration) {
                const startTop = element.scrollTop;
                const change = targetTop - startTop;
                const startTime = performance.now();

                function animateScroll(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 3);
                    element.scrollTop = startTop + change * easeProgress;

                    if (progress < 1) {
                        requestAnimationFrame(animateScroll);
                    }
                }

                requestAnimationFrame(animateScroll);
            }

            if (linkTop < scrollTop || linkTop + linkHeight > scrollTop + tocHeight) {
                smoothScrollTo(toc, linkTop - tocHeight / 2 + linkHeight / 2, 300);
            }
                        }
                    }
                });
            }, {
                rootMargin: '-100px 0px -60% 0px',
                threshold: 0
            });

            headings.forEach(function(heading) {
                observer.observe(heading);
            });
        });
    </script>
