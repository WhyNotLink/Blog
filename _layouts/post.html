<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} - LIN's Blog</title>
    <!-- 使用 relative_url 确保路径永远正确 -->
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/post.css' | relative_url }}">
    
    <script>
        // const navbar = document.getElementById('navbar');
        // const hero = document.querySelector('.hero');
        // const heroHeight = hero.offsetHeight;
        const threshold = 200;

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            if (scrollY > threshold) {
            navbar.classList.add('scrolled');
            } else {
            navbar.classList.remove('scrolled');
            }
        });
       
    </script>
        <!-- Odometer 数字滚动插件 -->
    <link rel="stylesheet" href="/Blog/odometr.css">
    <script src="/Blog/odometr.js"></script>
    <!-- 博客运行计时核心脚本 -->
    <script>
    window.pjaxLoaded = function(){
        var blog_running_days=document.getElementById("blog_running_days");
        var blog_running_hours=document.getElementById("blog_running_hours");
        var blog_running_mins=document.getElementById("blog_running_mins");
        var blog_running_secs=document.getElementById("blog_running_secs");
        
        function refresh_blog_running_time(){
            // 博客起始时间：2024年10月7日（月份0-11，所以9代表10月）
            var time = new Date() - new Date(2024, 9, 7, 0, 0, 0);
            var d=parseInt(time/24/60/60/1000);
            var h=parseInt(time%(24*60*60*1000)/60/60/1000);
            var m=parseInt(time%(60*60*1000)/60/1000);
            var s=parseInt(time%(60*1000)/1000);
            
            blog_running_days.innerHTML=d;
            blog_running_hours.innerHTML=h;
            blog_running_mins.innerHTML=m;
            blog_running_secs.innerHTML=s;
        };
        
        refresh_blog_running_time();
        if (typeof(bottomTimeIntervalHasSet) == "undefined"){
            var bottomTimeIntervalHasSet = true;
            setInterval(refresh_blog_running_time,500);
        }
    };
    // 初始化数字滚动
    window.onload = function(){
        odometer_init();
        window.pjaxLoaded();
    };

    function odometer_init(){
        let el = document.getElementsByClassName('odometer');
        for (let i = 0; i < el.length; i++) {
            od = new Odometer({
                el: el[i],
                format: 'ddd',
                duration: 200
            });
        }
    }
    </script>



</head>
<body>

    <nav class="nav" id="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="{{ '/index.html' | relative_url }}">首页</a></li>
                <li><a href="{{ '/sort.html' | relative_url }}">分类</a></li>
                <li><a href="{{ '/history.html' | relative_url }}">归档</a></li>
                <li><a href="{{ '/aboutme.html' | relative_url }}">关于我</a></li>
            </ul>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            <div class="content">
                <article class="post-detail">
                    <h1 class="post-title">{{ page.title }}</h1>
                    <div class="post-meta">
                        {{ page.date | date: "%Y年%m月%d日" }} | 分类：{{ page.category }}
                    </div>
                    
                    <!-- Jekyll 会把 Markdown 的内容塞到这里 -->
                    <div class="entry-content">
                        {{ content }}
                    </div>
                    
                </article>
                
                <div style="margin-top:30px;">
                    <a href="{{ '/' | relative_url }}" class="post-read-more">← Back</a>
                </div>
            </div>
            
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container ">
            <!-- 版权信息 -->
            <div>Copyright © 2024 - 版权归属 LIN</div>
            <!-- 博客运行计时 -->
            <div class="running-time">
                本博客已运行 
                <span id="blog_running_days" class="odometer"></span> days , 
                <span id="blog_running_hours" class="odometer"></span> h , 
                <span id="blog_running_mins" class="odometer"></span> m , 
                <span id="blog_running_secs" class="odometer"></span> s
            </div>
        </div>
    </footer>
    <!-- 支持 Mermaid 流程图 -->
    {% if page.mermaid %}
        <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
        <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. 找到所有被 kramdown 标记为 mermaid 的代码块
            const mermaidBlocks = document.querySelectorAll('pre > code.language-mermaid');
            
            mermaidBlocks.forEach((codeBlock) => {
            // 2. 创建一个新的 div，类名为 mermaid
            const container = document.createElement('div');
            container.className = 'mermaid';
            // 3. 将原始内容（代码）放入 div
            container.textContent = codeBlock.textContent;
            
            // 4. 替换掉原本的 pre 标签
            const pre = codeBlock.parentElement;
            pre.parentNode.replaceChild(container, pre);
            });

            // 5. 手动启动渲染
            mermaid.initialize({ startOnLoad: true });
        });
        </script>
    {% endif %}
</body>
    <script src="https://cdn.jsdelivr.net/gh/huangwb8/bloghelper@latest/mouse/halo-dream/fairyDustCursor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/huangwb8/bloghelper@latest/js/input-with-fire.js"></script>

</html>
