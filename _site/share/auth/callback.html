<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 授权回调</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .callback-container { text-align: center; color: #fff; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: rgba(255,255,255,0.7); font-size: 14px; }
        .error {
            color: #ff6b6b; margin-top: 20px; padding: 15px;
            background: rgba(255,107,107,0.1); border-radius: 8px; display: none;
        }
        .success {
            color: #51cf66; margin-top: 20px; padding: 15px;
            background: rgba(81,207,102,0.1); border-radius: 8px; display: none;
        }
        .config-note {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            text-align: left;
            max-width: 400px;
        }
        .config-note h3 { margin-bottom: 10px; font-size: 16px; }
        .config-note code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <h1>正在处理授权...</h1>
        <p>请稍候，正在完成 GitHub 授权流程</p>
        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>
        <div class="config-note" id="configNote" style="display: none;">
            <h3>⚠️ 需要配置代理服务</h3>
            <p style="font-size: 13px; margin-bottom: 10px;">由于浏览器安全策略限制，需要使用代理服务来交换Token。</p>
            <p style="font-size: 13px; margin-bottom: 10px;"><strong>步骤：</strong></p>
            <ol style="font-size: 12px; padding-left: 20px; line-height: 1.6;">
                <li>部署 <code>github-oauth-proxy.js</code> 到 Cloudflare Workers</li>
                <li>获取你的 Worker URL (如 <code>https://your-worker.workers.dev</code>)</li>
                <li>更新此文件中的 <code>PROXY_URL</code> 为你的 Worker URL</li>
            </ol>
        </div>
    </div>

    <script>
        const PROXY_URL = 'https://plain-feather-7c66.2904518529.workers.dev';

        class OAuthCallback {
            constructor() {
                this.clientId = 'Ov23liqFcIgZGNAkpbmH';
                this.init();
            }

            async init() {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) {
                    this.showError('授权被拒绝: ' + (urlParams.get('error_description') || error));
                    setTimeout(() => { window.location.href = '/Blog/share/language.html'; }, 5000);
                    return;
                }

                if (!code) {
                    this.showError('未收到授权码，请重试');
                    setTimeout(() => { window.location.href = '/Blog/share/language.html'; }, 5000);
                    return;
                }

                try {
                    const savedState = sessionStorage.getItem('oauth_state');
                    const verifier = sessionStorage.getItem('pkce_verifier');

                    if (state !== savedState) {
                        throw new Error('状态验证失败，请重试');
                    }

                    sessionStorage.removeItem('oauth_state');
                    sessionStorage.removeItem('pkce_verifier');

                    const response = await fetch(`${PROXY_URL}/github/token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            client_id: this.clientId,
                            code: code,
                            code_verifier: verifier
                        })
                    });

                    if (!response.ok) {
                        throw new Error('获取访问令牌失败');
                    }

                    const data = await response.json();

                    if (data.error) {
                        throw new Error(data.error_description || '授权失败');
                    }

                    localStorage.setItem('github_token', data.access_token);

                    this.showSuccess('授权成功！正在跳转...');
                    window.location.href = '/Blog/share/language.html?auth=success';

                } catch (err) {
                    console.error('OAuth error:', err);
                    if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                        document.getElementById('configNote').style.display = 'block';
                        this.showError('CORS错误: ' + err.message + ' - 请先配置代理服务');
                    } else {
                        this.showError('授权失败: ' + err.message);
                    }
                    setTimeout(() => { window.location.href = '/Blog/share/language.html'; }, 5000);
                }
            }

            showError(message) {
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('h1').textContent = '授权失败';
                document.querySelector('p').textContent = '';
                const errorEl = document.getElementById('errorMessage');
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }

            showSuccess(message) {
                document.querySelector('.spinner').style.borderTopColor = '#51cf66';
                document.querySelector('h1').textContent = '授权成功';
                const successEl = document.getElementById('successMessage');
                successEl.textContent = message;
                successEl.style.display = 'block';
            }
        }

        new OAuthCallback();
    </script>
</body>
</html>
